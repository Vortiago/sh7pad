<template id="bs-root">
  <section
    class="bs-root"
    role="dialog"
    aria-modal="false"
    data-sheet-state="closed"
  >
    <button type="button" class="bs-handle" data-slot="handle">
      <span class="bs-grabber"></span>
    </button>
    <h2 class="sr-only" data-slot="heading"></h2>
    <div class="bs-body" data-slot="body"></div>
  </section>
</template>
